<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings — Halloween Candy — Popular Judgment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="https://popularjudgment.com" class="logo-home-link">
          <span class="logo-eyebrow">POPULAR JUDGMENT</span>
        </a>
        <span class="logo-top">HALLOWEEN CANDY</span>
        <span class="logo-sub">RANKINGS</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="stat-votes">—</span>
          <span class="stat-label">Total Votes</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="stat-candies">50</span>
          <span class="stat-label">Candies</span>
        </div>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Vote</a>
        <a href="leaderboard.html" class="nav-link active">Rankings</a>
      </nav>
    </div>
  </header>

  <main class="main-content">

    <section class="leaderboard-section">
      <div class="leaderboard-header">
        <h1 class="lb-title">Community Rankings</h1>
        <p class="lb-subtitle">Sorted by Elo rating · Updated in real time</p>
      </div>

      <div id="tableContainer" class="table-wrap">
        <div class="loading-state">
          <div class="loading-pumpkin">🎃</div>
          <p>Loading rankings…</p>
        </div>
      </div>

      <div class="lb-cta">
        <a href="index.html" class="vote-cta-btn">Cast Your Votes →</a>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>A community ranking of Halloween candy · <a href="https://popularjudgment.com">Popular Judgment</a></p>
  </footer>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfOu7bAIfIQ8bWEpsZTdeDv-8FT0qL7X4",
      authDomain: "topps-ranker.firebaseapp.com",
      projectId: "topps-ranker",
      storageBucket: "topps-ranker.firebasestorage.app",
      messagingSenderId: "252611399751",
      appId: "1:252611399751:web:0441e77faa1e7786376162"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.__db = db;
    window.__doc = doc;
    window.__onSnapshot = onSnapshot;

    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script src="candies.js"></script>
  <script src="leaderboard.js"></script>

</body>
</html>
