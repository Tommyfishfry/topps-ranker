<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings — Topps Design Rankings — Popular Judgment</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .lb-header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 4px solid var(--ink);
    }
    .lb-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .lb-header .subhead {
      margin-top: 0.5rem;
      font-family: var(--font-heading);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      opacity: 0.55;
    }
    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .podium-card {
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      text-align: center;
      position: relative;
    }
    .podium-card.rank-1 { border-color: #FFD700; box-shadow: 0 0 0 3px #FFD700, var(--card-shadow); transform: translateY(-8px); }
    .podium-card.rank-2 { border-color: #C0C0C0; box-shadow: 0 0 0 2px #C0C0C0, var(--card-shadow); }
    .podium-card.rank-3 { border-color: #CD7F32; box-shadow: 0 0 0 2px #CD7F32, var(--card-shadow); }
    .podium-medal { position: absolute; top: 8px; left: 8px; font-size: 1.4rem; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
    .podium-img-wrap { width: 100%; aspect-ratio: 2.5 / 3.5; background: var(--cream-dark); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
    .podium-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .podium-placeholder { width: 100%; height: 100%; display: none; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 2rem; color: #fff; font-weight: 700; }
    .podium-info { padding: 0.75rem; border-top: 2px solid var(--cream-dark); }
    .podium-year { font-family: var(--font-display); font-size: 1rem; font-weight: 700; display: block; }
    .podium-rank-num { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; display: block; color: var(--ink); opacity: 0.4; margin-bottom: 0.1rem; }
    .podium-score { font-family: var(--font-heading); font-weight: 700; font-size: 0.95rem; color: var(--blue); display: block; margin-top: 0.15rem; }
    .podium-record { font-family: var(--font-body); font-size: 0.75rem; color: var(--ink-light); opacity: 0.6; display: block; margin-top: 0.1rem; }
    .rankings-table { width: 100%; border-collapse: collapse; background: #fff; border: 2px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: var(--card-shadow); }
    .rankings-table thead { background: var(--ink); color: var(--cream); }
    .rankings-table thead th { padding: 0.85rem 1rem; text-align: left; font-family: var(--font-heading); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .rankings-table thead th.right { text-align: right; }
    .rankings-table thead th.center { text-align: center; }
    .era-50s { background: #fff8f0; }
    .era-60s { background: #f0f8ff; }
    .era-70s { background: #fff0f0; }
    .era-80s { background: #f0fff4; }
    .era-90s { background: #f8f0ff; }
    .era-00s { background: #fffff0; }
    .era-10s { background: #f0f8f8; }
    .era-20s { background: #fff5f5; }
    .rankings-table tbody tr { border-bottom: 1px solid var(--cream-dark); transition: filter 0.12s; }
    .rankings-table tbody tr:last-child { border-bottom: none; }
    .rankings-table tbody tr:hover { filter: brightness(0.96); }
    .rankings-table td { padding: 0.6rem 1rem; font-size: 0.9rem; vertical-align: middle; }
    .td-rank { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; text-align: center; color: var(--ink-light); opacity: 0.45; width: 40px; }
    .td-thumb { width: 52px; padding: 0.3rem 0.5rem; }
    .thumb-wrap { position: relative; display: inline-block; }
    .thumb-img { width: 36px; height: 50px; object-fit: contain; border-radius: 2px; border: 1px solid var(--border); display: block; background: var(--cream-dark); }
    .thumb-placeholder { width: 36px; height: 50px; border-radius: 2px; border: 1px solid var(--border); display: none; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 0.5rem; font-weight: 700; color: #fff; }
    .td-year { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
    .era-badge { display: inline-block; font-family: var(--font-heading); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.1rem 0.4rem; border-radius: 2px; margin-left: 0.4rem; opacity: 0.6; background: rgba(0,0,0,0.08); color: var(--ink); vertical-align: middle; }
    .low-votes { font-family: var(--font-heading); font-size: 0.65rem; background: var(--cream-dark); border: 1px solid var(--border); border-radius: 2px; padding: 0.1rem 0.35rem; color: var(--ink-light); opacity: 0.55; margin-left: 0.3rem; vertical-align: middle; }
    .td-bar { width: 160px; }
    .rating-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .rating-bar-bg { flex: 1; height: 8px; background: var(--cream-dark); border-radius: 4px; overflow: hidden; }
    .rating-bar-fill { height: 100%; border-radius: 4px; background: var(--blue); }
    .rating-number { font-family: var(--font-heading); font-weight: 700; font-size: 0.85rem; color: var(--blue); white-space: nowrap; min-width: 32px; text-align: right; }
    .td-record { font-family: var(--font-heading); font-size: 0.82rem; text-align: right; color: var(--ink-light); opacity: 0.6; white-space: nowrap; }
    .lb-cta { text-align: center; margin-top: 2rem; }
    .vote-cta-btn { display: inline-block; background: var(--red); color: #fff; font-family: var(--font-heading); font-weight: 700; font-size: 1rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; padding: 0.85rem 2.5rem; border-radius: 3px; transition: background 0.15s; }
    .vote-cta-btn:hover { background: var(--red-dark); }
    @media (max-width: 700px) {
      .podium { gap: 0.5rem; }
      .td-bar { display: none; }
      .era-badge { display: none; }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">
    <div class="loading-ball"></div>
    <p>Loading rankings…</p>
  </div>

  <header class="site-header">
    <a href="/" class="logo">Popular <span>Judgment</span></a>
    <nav>
      <a href="index.html">Vote</a>
      <a href="leaderboard.html" class="active rankings-tab">The Rankings</a>
    </nav>
  </header>

  <div class="vote-banner">
    Community-powered rankings — updated after every vote
  </div>

  <main class="page">
    <div class="lb-header">
      <h1>The Definitive Rankings</h1>
      <p class="subhead" id="rankingSubhead">Loading…</p>
    </div>
    <div id="podiumContainer"></div>
    <div id="tableContainer"></div>
    <div class="lb-cta"><a href="index.html" class="vote-cta-btn">Cast Your Votes →</a></div>
  </main>

  <footer class="site-footer">
    <p>A community ranking of Topps Baseball card designs · <a href="/">Popular Judgment</a></p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfOu7bAIfIQ8bWEpsZTdeDv-8FT0qL7X4",
      authDomain: "topps-ranker.firebaseapp.com",
      projectId: "topps-ranker",
      storageBucket: "topps-ranker.firebasestorage.app",
      messagingSenderId: "252611399751",
      appId: "1:252611399751:web:0441e77faa1e7786376162"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const YEAR_COLORS = {
      1952:"#c8102e",1953:"#1a3a6b",1954:"#2d6a2d",1955:"#8b4513",1956:"#4a4a8a",
      1957:"#1a1a2e",1958:"#d4a017",1959:"#c8102e",1960:"#2d6a2d",1961:"#1a3a6b",
      1962:"#8b5e3c",1963:"#c8102e",1964:"#1a1a1a",1965:"#2d6a2d",1966:"#4a4a8a",
      1967:"#8b4513",1968:"#5c4033",1969:"#c8102e",1970:"#1a3a6b",1971:"#111111",
      1972:"#e07b00",1973:"#2d6a2d",1974:"#1a3a6b",1975:"#ff4136",1976:"#003087",
      1977:"#c8102e",1978:"#d4a017",1979:"#ff6b35",1980:"#4a4a8a",1981:"#1a1a1a",
      1982:"#2d6a2d",1983:"#c8102e",1984:"#111111",1985:"#1a3a6b",1986:"#1a1a1a",
      1987:"#8b5e3c",1988:"#1a3a6b",1989:"#4a4a4a",1990:"#2d6a2d",1991:"#d4a017",
      1992:"#c8a400",1993:"#c8102e",2000:"#d4a017",2006:"#4a4a4a",2008:"#2d6a2d",
      2011:"#d4a017",2014:"#1a1a1a",2016:"#8a8a8a",2019:"#c8102e",2020:"#003087",
      2021:"#8a8a8a",2022:"#1a1a1a",2023:"#c8102e",2024:"#1a3a6b",2025:"#c8102e",2026:"#2d6a2d"
    };

    const ALL_YEARS = [
      1952,1953,1954,1955,1956,1957,1958,1959,1960,1961,1962,1963,1964,1965,
      1966,1967,1968,1969,1970,1971,1972,1973,1974,1975,1976,1977,1978,1979,
      1980,1981,1982,1983,1984,1985,1986,1987,1988,1989,1990,1991,1992,1993,
      2000,2006,2008,2011,2014,2016,2019,2020,2021,2022,2023,2024,2025,2026
    ];

    function getEra(year) {
      if (year < 1960) return { label: "50s", cls: "era-50s" };
      if (year < 1970) return { label: "60s", cls: "era-60s" };
      if (year < 1980) return { label: "70s", cls: "era-70s" };
      if (year < 1990) return { label: "80s", cls: "era-80s" };
      if (year < 2000) return { label: "90s", cls: "era-90s" };
      if (year < 2010) return { label: "00s", cls: "era-00s" };
      if (year < 2020) return { label: "10s", cls: "era-10s" };
      return { label: "20s", cls: "era-20s" };
    }

    function podiumThumb(year) {
      const color = YEAR_COLORS[year] || '#555';
      return `
        <img src="images/${year}a.jpg" style="width:100%;height:100%;object-fit:contain;"
          onerror="this.src='images/${year}.jpg';this.onerror=function(){this.style.display='none';this.parentElement.querySelector('.podium-placeholder').style.display='flex';}"
          alt="${year} Topps" />
        <div class="podium-placeholder" style="background:${color}">${year}</div>
      `;
    }

    function rowThumb(year) {
      const color = YEAR_COLORS[year] || '#555';
      return `
        <img src="images/${year}a.jpg" class="thumb-img"
          onerror="this.src='images/${year}.jpg';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex';}"
          alt="${year}" />
        <div class="thumb-placeholder" style="background:${color}">${year}</div>
      `;
    }

    async function render() {
      try {
        const snapshot = await getDocs(collection(db, 'cards'));
        const firebaseData = {};
        snapshot.forEach(d => {
          firebaseData[d.id] = d.data();
          firebaseData[Number(d.id)] = d.data();
        });

        const statsSnap = await getDoc(doc(db, 'stats', 'global'));
        const totalVotes = statsSnap.exists() ? (statsSnap.data().totalVotes ?? 0) : 0;

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('rankingSubhead').textContent =
          `${totalVotes.toLocaleString()} votes cast — ${ALL_YEARS.length} designs ranked`;

        const DEFAULT_ELO = 1500;
        const rankings = ALL_YEARS.map(year => {
          const d = firebaseData[year] ?? firebaseData[String(year)] ?? { elo: DEFAULT_ELO, wins: 0, losses: 0, comparisons: 0 };
          return { year, ...d };
        }).sort((a, b) => b.elo - a.elo);

        // Podium top 3
        const medals = ['🥇','🥈','🥉'];
        const rankLabels = ['#1','#2','#3'];
        const rankClasses = ['rank-1','rank-2','rank-3'];
        document.getElementById('podiumContainer').innerHTML = `
          <div class="podium">
            ${rankings.slice(0,3).map((card, i) => {
              const winPct = card.comparisons > 0 ? Math.round((card.wins/card.comparisons)*100) : '—';
              return `
                <div class="podium-card ${rankClasses[i]}">
                  <div class="podium-medal">${medals[i]}</div>
                  <div class="podium-img-wrap">${podiumThumb(card.year)}</div>
                  <div class="podium-info">
                    <span class="podium-rank-num">${rankLabels[i]}</span>
                    <span class="podium-year">${card.year} Topps</span>
                    <span class="podium-score">${card.elo} pts</span>
                    <span class="podium-record">${card.wins}W – ${card.losses}L (${winPct}%)</span>
                  </div>
                </div>`;
            }).join('')}
          </div>`;

        // Table rows 4+
        const maxElo = rankings[0].elo;
        const minElo = rankings[rankings.length-1].elo;
        const eloRange = maxElo - minElo || 1;

        const rows = rankings.slice(3).map((card, i) => {
          const rank = i + 4;
          const era = getEra(card.year);
          const winPct = card.comparisons > 0 ? Math.round((card.wins/card.comparisons)*100) : '—';
          const barPct = Math.round(((card.elo - minElo) / eloRange) * 100);
          const lowVotes = card.comparisons < 5 ? '<span class="low-votes">few votes</span>' : '';
          return `
            <tr class="${era.cls}">
              <td class="td-rank">${rank}</td>
              <td class="td-thumb"><div class="thumb-wrap">${rowThumb(card.year)}</div></td>
              <td class="td-year">${card.year} Topps<span class="era-badge">${era.label}</span>${lowVotes}</td>
              <td class="td-bar">
                <div class="rating-bar-wrap">
                  <div class="rating-bar-bg"><div class="rating-bar-fill" style="width:${barPct}%"></div></div>
                  <span class="rating-number">${card.elo}</span>
                </div>
              </td>
              <td class="td-record">${card.wins}–${card.losses} (${winPct}%)</td>
            </tr>`;
        }).join('');

        document.getElementById('tableContainer').innerHTML = `
          <table class="rankings-table">
            <thead>
              <tr>
                <th class="center">#</th>
                <th class="center">Card</th>
                <th>Design Year</th>
                <th>Rating</th>
                <th class="right">Win–Loss</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;

      } catch(e) {
        console.error('Failed to load rankings:', e);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('tableContainer').innerHTML = '<p style="padding:2rem;text-align:center;color:#999">Could not load rankings.</p>';
      }
    }

    render();
  </script>

</body>
</html>
