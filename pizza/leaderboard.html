<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings — Pizza Toppings — Popular Judgment</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .lb-header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 4px solid var(--ink); }
    .lb-header h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); color: var(--ink); text-transform: uppercase; letter-spacing: 0.04em; }
    .lb-header .subhead { margin-top: 0.5rem; font-family: var(--font-heading); font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); opacity: 0.55; }

    .podium { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 2.5rem; }
    .podium-card { background: #fff; border: 3px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: var(--card-shadow); text-align: center; position: relative; }
    .podium-card.rank-1 { border-color: #FFD700; box-shadow: 0 0 0 3px #FFD700, var(--card-shadow); transform: translateY(-8px); }
    .podium-card.rank-2 { border-color: #C0C0C0; box-shadow: 0 0 0 2px #C0C0C0, var(--card-shadow); }
    .podium-card.rank-3 { border-color: #CD7F32; box-shadow: 0 0 0 2px #CD7F32, var(--card-shadow); }
    .podium-medal { position: absolute; top: 8px; left: 8px; font-size: 1.4rem; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
    .podium-img-wrap { width: 100%; aspect-ratio: 1/1; background: var(--cream-dark); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
    .podium-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .podium-placeholder { width: 100%; height: 100%; display: none; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1rem; color: #fff; background: var(--red); padding: 1rem; text-align: center; }
    .podium-info { padding: 0.75rem; border-top: 2px solid var(--cream-dark); }
    .podium-name { font-family: var(--font-display); font-size: 0.9rem; display: block; }
    .podium-rank-num { font-family: var(--font-display); font-size: 1.3rem; display: block; color: var(--ink); opacity: 0.4; margin-bottom: 0.1rem; }
    .podium-score { font-family: var(--font-heading); font-weight: 700; font-size: 0.95rem; color: var(--red); display: block; margin-top: 0.15rem; }
    .podium-record { font-family: var(--font-body); font-size: 0.75rem; color: var(--ink-light); opacity: 0.6; display: block; margin-top: 0.1rem; }

    .rankings-table { width: 100%; border-collapse: collapse; background: #fff; border: 2px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: var(--card-shadow); }
    .rankings-table thead { background: var(--ink); color: var(--cream); }
    .rankings-table thead th { padding: 0.85rem 1rem; text-align: left; font-family: var(--font-heading); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .rankings-table thead th.right { text-align: right; }
    .rankings-table thead th.center { text-align: center; }

    .cat-sauce     { background: #fff5f0; }
    .cat-meat      { background: #fff0f0; }
    .cat-vegetable { background: #f0fff4; }
    .cat-cheese    { background: #fffff0; }
    .cat-finisher  { background: #f5f0ff; }
    .cat-wildcard  { background: #fff0f8; }

    .rankings-table tbody tr { border-bottom: 1px solid var(--cream-dark); transition: filter 0.12s; }
    .rankings-table tbody tr:last-child { border-bottom: none; }
    .rankings-table tbody tr:hover { filter: brightness(0.96); }
    .rankings-table td { padding: 0.6rem 1rem; font-size: 0.9rem; vertical-align: middle; }
    .td-rank { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; text-align: center; color: var(--ink-light); opacity: 0.45; width: 40px; }
    .td-thumb { width: 52px; padding: 0.3rem 0.5rem; }
    .thumb-img { width: 44px; height: 44px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); display: block; background: var(--cream-dark); }
    .thumb-placeholder { width: 44px; height: 44px; border-radius: 2px; border: 1px solid var(--border); display: none; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 0.45rem; font-weight: 700; color: #fff; background: var(--red); text-align: center; padding: 2px; }
    .td-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
    .cat-badge { display: inline-block; font-family: var(--font-heading); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.1rem 0.4rem; border-radius: 2px; margin-left: 0.4rem; opacity: 0.6; background: rgba(0,0,0,0.08); color: var(--ink); vertical-align: middle; }
    .low-votes { font-family: var(--font-heading); font-size: 0.65rem; background: var(--cream-dark); border: 1px solid var(--border); border-radius: 2px; padding: 0.1rem 0.35rem; color: var(--ink-light); opacity: 0.55; margin-left: 0.3rem; vertical-align: middle; }
    .td-bar { width: 160px; }
    .rating-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .rating-bar-bg { flex: 1; height: 8px; background: var(--cream-dark); border-radius: 4px; overflow: hidden; }
    .rating-bar-fill { height: 100%; border-radius: 4px; background: var(--red); }
    .rating-number { font-family: var(--font-heading); font-weight: 700; font-size: 0.85rem; color: var(--red); white-space: nowrap; min-width: 32px; text-align: right; }
    .td-record { font-family: var(--font-heading); font-size: 0.82rem; text-align: right; color: var(--ink-light); opacity: 0.6; white-space: nowrap; }

    .lb-cta { text-align: center; margin-top: 2rem; }
    .vote-cta-btn { display: inline-block; background: var(--red); color: #fff; font-family: var(--font-heading); font-weight: 700; font-size: 1rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; padding: 0.85rem 2.5rem; border-radius: 3px; transition: background 0.15s; }
    .vote-cta-btn:hover { background: var(--red-dark); }

    @media (max-width: 700px) {
      .podium { gap: 0.5rem; }
      .td-bar { display: none; }
      .cat-badge { display: none; }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">
    <div class="loading-ball"></div>
    <p>Loading rankings…</p>
  </div>

  <header class="site-header">
    <a href="/" class="logo">Popular <span>Judgment</span></a>
    <nav>
      <a href="index.html">Vote</a>
      <a href="leaderboard.html" class="active rankings-tab">The Rankings</a>
    </nav>
  </header>

  <div class="vote-banner">Community-powered rankings — updated after every vote</div>

  <main class="page">
    <div class="lb-header">
      <h1>The Definitive Rankings</h1>
      <p class="subhead" id="rankingSubhead">Loading…</p>
    </div>
    <div id="podiumContainer"></div>
    <div id="tableContainer"></div>
    <div class="lb-cta"><a href="index.html" class="vote-cta-btn">Cast Your Votes →</a></div>
  </main>

  <footer class="site-footer">
    <p>A community ranking of pizza toppings · <a href="/">Popular Judgment</a></p>
  </footer>

  <script src="pizza.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfOu7bAIfIQ8bWEpsZTdeDv-8FT0qL7X4",
      authDomain: "topps-ranker.firebaseapp.com",
      projectId: "topps-ranker",
      storageBucket: "topps-ranker.firebasestorage.app",
      messagingSenderId: "252611399751",
      appId: "1:252611399751:web:0441e77faa1e7786376162"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const STATS_DOC = 'pizza-stats';
    const DEFAULT_ELO = 1500;

    function getCatClass(category) {
      return 'cat-' + category.toLowerCase();
    }

    function podiumThumb(item) {
      return `
        <img src="images/${item.id}.jpg" style="width:100%;height:100%;object-fit:cover;"
          onerror="this.style.display='none';this.parentElement.querySelector('.podium-placeholder').style.display='flex';"
          alt="${item.name}" />
        <div class="podium-placeholder">${item.name}</div>
      `;
    }

    function rowThumb(item) {
      return `
        <img src="images/${item.id}.jpg" class="thumb-img"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
          alt="${item.name}" />
        <div class="thumb-placeholder">${item.name}</div>
      `;
    }

    async function render() {
      try {
        const snapshot = await getDocs(collection(db, 'pizza'));
        const firebaseData = {};
        snapshot.forEach(d => { firebaseData[d.id] = d.data(); });

        const statsSnap = await getDoc(doc(db, 'stats', STATS_DOC));
        const totalVotes = statsSnap.exists() ? (statsSnap.data().totalVotes ?? 0) : 0;

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('rankingSubhead').textContent =
          `${totalVotes.toLocaleString()} votes cast — ${window.PIZZA.length} toppings ranked`;

        const rankings = window.PIZZA.map(p => {
          const d = firebaseData[p.id] ?? { elo: DEFAULT_ELO, wins: 0, losses: 0, comparisons: 0 };
          return { ...p, ...d };
        }).sort((a, b) => b.elo - a.elo);

        const medals = ['🥇','🥈','🥉'];
        const rankLabels = ['#1','#2','#3'];
        const rankClasses = ['rank-1','rank-2','rank-3'];
        document.getElementById('podiumContainer').innerHTML = `
          <div class="podium">
            ${rankings.slice(0,3).map((item, i) => {
              const winPct = item.comparisons > 0 ? Math.round((item.wins/item.comparisons)*100) : '—';
              return `
                <div class="podium-card ${rankClasses[i]}">
                  <div class="podium-medal">${medals[i]}</div>
                  <div class="podium-img-wrap">${podiumThumb(item)}</div>
                  <div class="podium-info">
                    <span class="podium-rank-num">${rankLabels[i]}</span>
                    <span class="podium-name">${item.name}</span>
                    <span class="podium-score">${item.elo} pts</span>
                    <span class="podium-record">${item.wins}W – ${item.losses}L (${winPct}%)</span>
                  </div>
                </div>`;
            }).join('')}
          </div>`;

        const maxElo = rankings[0].elo;
        const minElo = rankings[rankings.length-1].elo;
        const eloRange = maxElo - minElo || 1;

        const rows = rankings.slice(3).map((item, i) => {
          const rank = i + 4;
          const winPct = item.comparisons > 0 ? Math.round((item.wins/item.comparisons)*100) : '—';
          const barPct = Math.round(((item.elo - minElo) / eloRange) * 100);
          const lowVotes = item.comparisons < 5 ? '<span class="low-votes">few votes</span>' : '';
          return `
            <tr class="${getCatClass(item.category)}">
              <td class="td-rank">${rank}</td>
              <td class="td-thumb"><div class="thumb-wrap">${rowThumb(item)}</div></td>
              <td class="td-name">${item.name}<span class="cat-badge">${item.category}</span>${lowVotes}</td>
              <td class="td-bar">
                <div class="rating-bar-wrap">
                  <div class="rating-bar-bg"><div class="rating-bar-fill" style="width:${barPct}%"></div></div>
                  <span class="rating-number">${item.elo}</span>
                </div>
              </td>
              <td class="td-record">${item.wins}–${item.losses} (${winPct}%)</td>
            </tr>`;
        }).join('');

        document.getElementById('tableContainer').innerHTML = `
          <table class="rankings-table">
            <thead>
              <tr>
                <th class="center">#</th>
                <th class="center">Topping</th>
                <th>Name</th>
                <th>Rating</th>
                <th class="right">Win–Loss</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;

      } catch(e) {
        console.error('Failed to load rankings:', e);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('tableContainer').innerHTML = '<p style="padding:2rem;text-align:center;color:#999">Could not load rankings.</p>';
      }
    }

    render();
  </script>

</body>
</html>
